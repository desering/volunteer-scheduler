services:
  postgres:
    restart: always
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      TZ: UTC
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s

  maildev:
    image: maildev/maildev:latest
    container_name: maildev
    ports:
      - "1080:1080"  # Web UI
      - "1025:1025"  # SMTP
    restart: always

  alloy: # OpenTelemetry Collector
    image: docker.io/grafana/alloy:v1.17.0
    volumes:
      - ./dev/config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "12345:12345" # Alloy UI (optional, good for debugging)
    depends_on:
      - prometheus
      - pyroscope

  prometheus:
    image: docker.io/prom/prometheus:v3.12.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver' # Allows Alloy to push metrics
      - '--log.level=warn'
    volumes:
      - ./dev/prometheus-config.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  pyroscope:
    image: docker.io/grafana/pyroscope:2.0.3
    command: ["-config.file=/etc/pyroscope/config.yaml"]
    volumes:
      - ./dev/pyroscope-config.yaml:/etc/pyroscope/config.yaml
    ports:
      - "4040:4040"

  grafana:
    image: docker.io/grafana/grafana:13.0.2
    volumes:
      - ./dev/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./dev/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    ports:
      - "8080:3000"
    depends_on:
      - prometheus
      - pyroscope

  bun-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    user: 1000:1000 # "bun" inside the container
    # user: 1001:1001 # "nextjs:nodejs" inside the container
    volumes:
      - .:/app # bind mount source for live edits
      - bun_next_cache:/app/.next # separate volume for cache
      - /app/node_modules  # mask container's installed deps (in the image)
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "bun run --bun dev"
    restart: always
    profiles:
      - bun

volumes:
  pgdata:
  bun_next_cache:
  grafana-storage:
