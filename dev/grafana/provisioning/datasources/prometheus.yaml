apiVersion: 1

datasources:
  # https://grafana.com/docs/grafana/latest/datasources/prometheus/
  - name: Prometheus
    uid: prom
    type: prometheus
    access: proxy
    url: http://localhost:9090/prometheus
    isDefault: true
    basicAuth: false
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: Mimir
      cacheLevel: High
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: anonymous
